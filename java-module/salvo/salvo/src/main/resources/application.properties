spring.config.import=optional:file:.env[.properties]

spring.application.name=salvo
spring.data.rest.base-path=/rest
spring.jackson.serialization.INDENT_OUTPUT=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:salvo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:}

firebase.project-id=${FIREBASE_PROJECT_ID:}
firebase.database-url=${FIREBASE_DATABASE_URL:}
firebase.credentials-base64=${FIREBASE_CREDENTIALS_BASE64:}
firebase.credentials-json=${FIREBASE_CREDENTIALS_JSON:}
